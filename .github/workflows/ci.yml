name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite:///./ci.db"
      ANTHROPIC_API_KEY: "test-key-not-used"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests (Claude mocked)
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        # Resolve deps fresh: installing against a committed lockfile can skip
        # platform-specific optional deps (rollup/esbuild), leaving vitest's bin
        # unlinked. Removing the lock forces a clean per-runner resolution.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Run unit tests
        run: npx vitest run
