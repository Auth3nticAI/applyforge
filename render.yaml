# Render Blueprint — stands up Postgres + backend + frontend from one file.
# Deploy: Render dashboard → New → Blueprint → pick this repo. See DEPLOY.md.
databases:
  - name: applyforge-db
    databaseName: applyforge
    user: applyforge
    plan: free

services:
  - type: web
    name: applyforge-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: applyforge-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false            # set in the dashboard (secret)
      - key: ALLOWED_ORIGINS
        sync: false            # set to the frontend URL after first deploy

  - type: web
    name: applyforge-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false            # set to the backend URL, then redeploy (baked at build)
